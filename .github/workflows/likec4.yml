name: Build and Deploy Docs with LikeC4

on:
  push:
    branches: [main]
    paths:
      - 'architecture/**'
      - 'docs/**'
      - '.github/workflows/likec4.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build LikeC4 diagrams
        working-directory: architecture
        run: npx likec4 build -o ../docs/diagrams --base /h3-routing-platform/diagrams/

      - name: Commit built diagrams
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/diagrams/
          git diff --staged --quiet || git commit -m "Build LikeC4 diagrams [skip ci]"
          git push
