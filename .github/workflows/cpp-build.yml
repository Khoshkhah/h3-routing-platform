name: C++ Build

on:
  push:
    branches: ["main"]
    paths:
      - "services/engine-cpp/cpp/**"
  pull_request:
    paths:
      - "services/engine-cpp/cpp/**"

jobs:
  build:
    name: C++ Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            libboost-system-dev libboost-filesystem-dev \
            libarrow-dev libparquet-dev

      - name: Cache H3 build
        uses: actions/cache@v4
        id: cache-h3
        with:
          path: /usr/local/lib/libh3*
          key: h3-v4.1.0

      - name: Build and install H3
        if: steps.cache-h3.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v4.1.0 https://github.com/uber/h3.git /tmp/h3
          cmake -S /tmp/h3 -B /tmp/h3/build \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_DOCS=OFF \
            -DBUILD_TESTING=OFF
          sudo cmake --build /tmp/h3/build -j$(nproc)
          sudo cmake --install /tmp/h3/build

      - name: Build C++ engine
        run: |
          cmake -S services/engine-cpp/cpp -B services/engine-cpp/cpp/build \
            -DCMAKE_PREFIX_PATH=/usr/local \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build services/engine-cpp/cpp/build -j$(nproc)
